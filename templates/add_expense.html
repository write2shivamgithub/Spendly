{% extends "base.html" %}

{% block title %}Add Expense — Spendly{% endblock %}

{% block content %}
<div class="auth-section">
    <div class="auth-container">
        <div class="auth-header">
            <h1 class="auth-title">Add Expense</h1>
            <p class="auth-subtitle">Record a new expense to your account.</p>
        </div>

        <div class="auth-card">
            {% if error %}
            <div class="form-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('add_expense') }}">
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input class="form-input" type="number" id="amount" name="amount"
                           step="0.01" min="0.01" required
                           value="{{ request.form.get('amount', '') }}">
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select class="form-input" id="category" name="category" required>
                        <option value="" disabled {% if not request.form.get('category') %}selected{% endif %}>Select a category</option>
                        {% for cat in categories %}
                        <option value="{{ cat }}" {% if request.form.get('category') == cat %}selected{% endif %}>{{ cat }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input class="form-input" type="date" id="date" name="date"
                           required value="{{ request.form.get('date', today) }}">
                </div>

                <div class="form-group">
                    <label for="description">
                        Description
                        <span class="form-optional">(optional)</span>
                    </label>
                    <input class="form-input" type="text" id="description" name="description"
                           maxlength="200" placeholder="e.g. Grocery run"
                           value="{{ request.form.get('description', '') }}">
                </div>

                <button class="btn-submit" type="submit">Save Expense</button>
            </form>
        </div>

        <p class="auth-switch">
            <a href="{{ url_for('profile') }}">← Cancel</a>
        </p>
    </div>
</div>
{% endblock %}
